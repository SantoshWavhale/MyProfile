<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Tracker · Santosh</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c1f;
      --border: #2a2a2e;
      --accent: #7c6af7;
      --accent-dim: rgba(124, 106, 247, 0.12);
      --green: #3ecf8e;
      --green-dim: rgba(62, 207, 142, 0.1);
      --text: #e8e8f0;
      --text-muted: #6b6b7a;
      --text-dim: #9898a8;
      --mobile: #f7a34b;
      --desktop: #7c6af7;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-card .logo {
      width: 40px;
      height: 40px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 28px;
      font-size: 13px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .topbar h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-label {
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
    }

    .btn-logout {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── STAT CARDS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.6;
    }

    .stat-card.green::before { background: var(--green); }
    .stat-card.orange::before { background: var(--mobile); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── GRID LAYOUT ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .panel-badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
    }

    /* ── TIMELINE ── */
    .timeline { padding: 8px 0; }

    .visit-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .visit-row:last-child { border-bottom: none; }
    .visit-row:hover { background: var(--surface2); }

    .visit-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 5px;
      flex-shrink: 0;
    }

    .visit-dot.mobile { background: var(--mobile); }

    .visit-info { flex: 1; min-width: 0; }

    .visit-id {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .visit-meta {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .visit-meta span { display: flex; align-items: center; gap: 4px; }

    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .badge-mobile {
      background: rgba(247, 163, 75, 0.12);
      color: var(--mobile);
      border: 1px solid rgba(247, 163, 75, 0.25);
    }

    .badge-desktop {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(124, 106, 247, 0.25);
    }

    .visit-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      font-family: var(--mono);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── SIDE PANELS ── */
    .referrer-row, .device-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .referrer-row:last-child, .device-row:last-child { border-bottom: none; }

    .referrer-name { color: var(--text-dim); }

    .referrer-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 0 12px;
      overflow: hidden;
    }

    .referrer-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .referrer-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      min-width: 24px;
      text-align: right;
    }

    /* ── DEVICE DONUT ── */
    .device-chart {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .donut-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }

    .donut-wrap svg { transform: rotate(-90deg); }

    .donut-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .donut-label .pct {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .donut-label .pct-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .device-legend { flex: 1; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .legend-item:last-child { margin-bottom: 0; }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-info { flex: 1; }
    .legend-name { color: var(--text-dim); }
    .legend-val { color: var(--text); font-weight: 500; font-family: var(--mono); }

    /* ── LOADING / EMPTY ── */
    .loading-state, .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">📡</div>
    <h1>Portfolio Tracker</h1>
    <p>Sign in to see who's visiting your portfolio.</p>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">📡</div>
      <h2>Portfolio Tracker</h2>
    </div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Visits</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">all time</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Unique Visitors</div>
        <div class="stat-value" id="stat-unique">—</div>
        <div class="stat-sub">by fingerprint</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="stat-today">—</div>
        <div class="stat-sub">visits today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mobile</div>
        <div class="stat-value" id="stat-mobile">—</div>
        <div class="stat-sub">of total visits</div>
      </div>
    </div>

    <!-- Main grid -->
    <div class="grid-2">

      <!-- Timeline -->
      <div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Visit Timeline</span>
            <span class="panel-badge" id="timeline-count">loading...</span>
          </div>
          <div class="timeline" id="timeline-list">
            <div class="loading-state">
              <div class="spinner"></div>
              Fetching visits...
            </div>
          </div>
        </div>
      </div>

      <!-- Side panels -->
      <div>
        <!-- Device split -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Device Split</span>
          </div>
          <div class="device-chart" id="device-chart">
            <div class="loading-state" style="padding:20px">—</div>
          </div>
        </div>

        <!-- Referrers -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Traffic Sources</span>
          </div>
          <div id="referrer-list">
            <div class="loading-state" style="padding:20px">—</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── CONFIG — replace these with your actual values ──
  const SUPABASE_URL = "https://obrohtnkehcmtpidufde.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_wANvSnP7dRK6N5MTmOisPw_YIf3pyzS";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── AUTH ──
  async function handleLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("login-btn");
    const err = document.getElementById("error-msg");

    btn.disabled = true;
    btn.textContent = "Signing in...";
    err.style.display = "none";

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      err.textContent = error.message;
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign In";
    } else {
      showDashboard();
    }
  }

  async function handleLogout() {
    await sb.auth.signOut();
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
  }

  // ── INIT ──
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      showDashboard();
    }
  }

  function showDashboard() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  }

  // ── LOAD DATA ──
  async function loadData() {
    const { data, error } = await sb
      .from("visits")
      .select("*")
      .order("visited_at", { ascending: false })
      .limit(200);

    if (error) { console.error(error); return; }

    renderStats(data);
    renderTimeline(data);
    renderDeviceChart(data);
    renderReferrers(data);
  }

  // ── STATS ──
  function renderStats(data) {
    const total = data.length;
    const unique = new Set(data.map(v => v.fingerprint_id)).size;

    const today = new Date().toISOString().slice(0, 10);
    const todayCount = data.filter(v => v.visited_at?.slice(0, 10) === today).length;

    const mobileCount = data.filter(v => v.device === "mobile").length;
    const mobilePct = total ? Math.round((mobileCount / total) * 100) + "%" : "0%";

    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-unique").textContent = unique;
    document.getElementById("stat-today").textContent = todayCount;
    document.getElementById("stat-mobile").textContent = mobilePct;
  }

  // ── TIMELINE ──
  function renderTimeline(data) {
    const list = document.getElementById("timeline-list");
    document.getElementById("timeline-count").textContent = `${data.length} visits`;

    if (!data.length) {
      list.innerHTML = `<div class="empty-state">No visits yet. Share your portfolio!</div>`;
      return;
    }

    list.innerHTML = data.map(v => {
      const id = v.fingerprint_id?.slice(0, 16) + "...";
      const device = v.device || "unknown";
      const referrer = cleanReferrer(v.referrer);
      const time = formatTime(v.visited_at);
      const page = v.page || "/";

      return `
        <div class="visit-row">
          <div class="visit-dot ${device === 'mobile' ? 'mobile' : ''}"></div>
          <div class="visit-info">
            <div class="visit-id">${v.fingerprint_id || 'unknown'}</div>
            <div class="visit-meta">
              <span><span class="badge ${device === 'mobile' ? 'badge-mobile' : 'badge-desktop'}">${device}</span></span>
              <span>📄 ${page}</span>
              <span>🔗 ${referrer}</span>
            </div>
          </div>
          <div class="visit-time">${time}</div>
        </div>`;
    }).join("");
  }

  // ── DEVICE CHART ──
  function renderDeviceChart(data) {
    const total = data.length;
    const mobile = data.filter(v => v.device === "mobile").length;
    const desktop = total - mobile;
    const mobilePct = total ? Math.round((mobile / total) * 100) : 0;
    const desktopPct = 100 - mobilePct;

    const r = 34;
    const circ = 2 * Math.PI * r;
    const mobileArc = (mobile / total) * circ;
    const desktopArc = circ - mobileArc;

    document.getElementById("device-chart").innerHTML = `
      <div class="donut-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="${r}" fill="none" stroke="#2a2a2e" stroke-width="10"/>
          <circle cx="40" cy="40" r="${r}" fill="none" stroke="#7c6af7" stroke-width="10"
            stroke-dasharray="${desktopArc} ${mobileArc}" stroke-linecap="round"/>
          <circle cx="40" cy="40" r="${r}" fill="none" stroke="#f7a34b" stroke-width="10"
            stroke-dasharray="${mobileArc} ${desktopArc}"
            stroke-dashoffset="${-desktopArc}" stroke-linecap="round"/>
        </svg>
        <div class="donut-label">
          <div class="pct">${total}</div>
          <div class="pct-label">TOTAL</div>
        </div>
      </div>
      <div class="device-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--desktop)"></div>
          <div class="legend-info">
            <div class="legend-name">Desktop</div>
            <div class="legend-val">${desktop} <span style="color:var(--text-muted);font-size:11px">${desktopPct}%</span></div>
          </div>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--mobile)"></div>
          <div class="legend-info">
            <div class="legend-name">Mobile</div>
            <div class="legend-val">${mobile} <span style="color:var(--text-muted);font-size:11px">${mobilePct}%</span></div>
          </div>
        </div>
      </div>`;
  }

  // ── REFERRERS ──
  function renderReferrers(data) {
    const counts = {};
    data.forEach(v => {
      const ref = cleanReferrer(v.referrer);
      counts[ref] = (counts[ref] || 0) + 1;
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const max = sorted[0]?.[1] || 1;

    document.getElementById("referrer-list").innerHTML = sorted.map(([ref, count]) => `
      <div class="referrer-row">
        <span class="referrer-name">${ref}</span>
        <div class="referrer-bar-wrap">
          <div class="referrer-bar" style="width:${(count / max) * 100}%"></div>
        </div>
        <span class="referrer-count">${count}</span>
      </div>`).join("");
  }

  // ── HELPERS ──
  function cleanReferrer(ref) {
    if (!ref || ref === "direct") return "Direct";
    try {
      const url = new URL(ref);
      const host = url.hostname.replace("www.", "");
      if (host.includes("linkedin")) return "LinkedIn";
      if (host.includes("google")) return "Google";
      if (host.includes("github")) return "GitHub";
      if (host.includes("naukri")) return "Naukri";
      return host;
    } catch {
      return ref;
    }
  }

  function formatTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);

    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;

    return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  }

  // Allow Enter key on login
  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") {
      handleLogin();
    }
  });
// Handle password reset link from email
async function handlePasswordReset() {
  const hash = window.location.hash;
  if (hash.includes("type=recovery")) {
    const params = new URLSearchParams(hash.replace("#", "?"));
    const accessToken = params.get("access_token");

    if (accessToken) {
      // Show password reset form
      document.getElementById("login-screen").innerHTML = `
        <div class="login-card">
          <div class="logo">🔑</div>
          <h1>Set New Password</h1>
          <p>Choose a password for your dashboard.</p>
          <div class="field">
            <label>NEW PASSWORD</label>
            <input type="password" id="new-password" placeholder="Min 6 characters" />
          </div>
          <button class="btn-primary" onclick="submitNewPassword('${accessToken}')">Set Password</button>
          <div class="error-msg" id="error-msg"></div>
        </div>`;
    }
  }
}

async function submitNewPassword(token) {
  const password = document.getElementById("new-password").value;
  const err = document.getElementById("error-msg");

  if (password.length < 6) {
    err.textContent = "Password must be at least 6 characters.";
    err.style.display = "block";
    return;
  }

  // Set the session using the token first
  await sb.auth.setSession({ access_token: token, refresh_token: token });

  const { error } = await sb.auth.updateUser({ password });

  if (error) {
    err.textContent = error.message;
    err.style.display = "block";
  } else {
    alert("Password set! You can now log in.");
    window.location.href = "/MyProfile/dashboard.html";
  }
}

handlePasswordReset();
init();
  init();
</script>
